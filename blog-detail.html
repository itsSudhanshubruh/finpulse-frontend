<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinPulse | Blog Reader</title>
    <!-- Modern Typography: Outfit for headers, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/lucide@latest/dist/umd/lucide.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .reader-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 5rem 1rem;
        }
        .reader-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }
        .reader-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .reader-image {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 3rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .reader-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-light);
            margin-bottom: 4rem;
        }
        
        /* Engagement Section */
        .engagement-bar {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 1rem;
            margin-bottom: 4rem;
            padding: 1.5rem 0;
            border-top: 1px solid rgba(0,0,0,0.1);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .like-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .like-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            transform: translateY(-2px);
        }
        .like-btn:active {
            transform: translateY(0);
        }

        .share-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .share-btn:hover {
            background: rgba(16, 185, 129, 0.2);
            transform: translateY(-2px);
        }
        .share-btn:active {
            transform: translateY(0);
        }

        /* Comments Section */
        .comments-section {
            background: #ffffff;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 4rem;
        }
        .comments-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--text-dark);
        }
        
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 3rem;
        }
        .comment-input {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-family: 'Inter', sans-serif;
        }
        .comment-btn {
            align-self: flex-start;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .comment-item {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid #3b82f6;
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .comment-author {
            font-weight: 600;
            color: #0f172a;
        }
        .comment-date {
            font-size: 0.85rem;
            color: #64748b;
        }
        .comment-text {
            color: #475569;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <!-- Minimal Header for Reading Experience -->
    <header class="navbar" style="background: white; border-bottom: 1px solid #f1f5f9;">
        <div class="container nav-content">
            <a href="blogs.html" class="logo" style="text-decoration: none;">
                <span style="display:flex; align-items:center; gap:0.5rem; color: #3b82f6; font-weight:600;"><i data-lucide="arrow-left"></i> Back to Blogs</span>
            </a>
            <a href="index.html" class="logo" style="text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
                <img src="assets/finpulse_logo.jpg" alt="FinPulse Logo" style="height: 36px; width: 42px; object-fit: cover; border-radius: 8px;">
                <span class="logo-text" style="color: black;">Fin<span class="text-primary">Pulse</span></span>
            </a>
        </div>
    </header>

    <div class="reader-container" id="loadingState">
        <p style="text-align: center; color: var(--text-muted); padding: 5rem 0;">Loading blog content...</p>
    </div>

    <!-- Main Content Injection -->
    <div class="reader-container" id="readerState" style="display: none;">
        <h1 class="reader-title" id="blogTitle"></h1>
        
        <div class="reader-meta">
            <span><i data-lucide="user" style="width: 16px; height: 16px; vertical-align: bottom;"></i> <span id="blogAuthor"></span></span>
            <span><i data-lucide="calendar" style="width: 16px; height: 16px; vertical-align: bottom;"></i> <span id="blogDate"></span></span>
        </div>

        <img id="blogImage" class="reader-image" src="" alt="Blog Cover" style="display: none;">
        
        <div class="reader-content" id="blogContent">
            <!-- Content injected here -->
        </div>

        <!-- Like Button -->
        <div class="engagement-bar">
            <button class="like-btn" id="likeBtn">
                <i data-lucide="thumbs-up"></i>
                <span id="likeCount">0</span> Likes
            </button>
            <button class="share-btn" id="shareBtn">
                <i data-lucide="share-2"></i>
                Share
            </button>
            <span style="color: #64748b; font-size: 0.9rem;">Enjoyed this article? Let the author know!</span>
        </div>

        <!-- Comments Section -->
        <div class="comments-section">
            <h3 class="comments-title"><i data-lucide="message-square" style="transform: translateY(3px);"></i> Discussion</h3>
            
            <form id="commentForm" class="comment-form">
                <input type="text" id="commenterName" class="comment-input" placeholder="Your Name (Optional)" maxlength="50">
                <textarea id="commenterText" class="comment-input" rows="3" placeholder="What are your thoughts?" required></textarea>
                <button type="submit" class="btn btn-primary comment-btn">Post Comment</button>
            </form>

            <div class="comment-list" id="commentList">
                <!-- Comments injected here -->
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.lucide) window.lucide.createIcons();

            const urlParams = new URLSearchParams(window.location.search);
            const blogId = urlParams.get('id');

            const loadingState = document.getElementById('loadingState');
            const readerState = document.getElementById('readerState');

            if (!blogId) {
                loadingState.innerHTML = '<p style="text-align:center; color:red;">No blog ID provided.</p>';
                return;
            }

            try {
                // Fetch the blog details
                const res = await fetch(`/api/blogs/${blogId}`);
                if (!res.ok) throw new Error('Failed to load blog');
                const blog = await res.json();

                // Paint the page
                document.title = `${blog.title} | FinPulse`;
                document.getElementById('blogTitle').textContent = blog.title;
                document.getElementById('blogAuthor').textContent = blog.author || 'Admin';
                document.getElementById('blogDate').textContent = new Date(blog.createdAt).toLocaleDateString();
                
                if (blog.image) {
                    const imgEl = document.getElementById('blogImage');
                    imgEl.src = blog.image;
                    imgEl.style.display = 'block';
                }

                document.getElementById('blogContent').innerHTML = blog.content;
                document.getElementById('likeCount').textContent = blog.likes || 0;

                renderComments(blog.comments || []);

                loadingState.style.display = 'none';
                readerState.style.display = 'block';

                // Setup Like Listener
                document.getElementById('likeBtn').addEventListener('click', async () => {
                    try {
                        const likeRes = await fetch(`/api/blogs/${blogId}/like`, { method: 'POST' });
                        if (likeRes.ok) {
                            const data = await likeRes.json();
                            document.getElementById('likeCount').textContent = data.likes;
                            // Add a visual pop effect
                            const btn = document.getElementById('likeBtn');
                            btn.style.background = 'rgba(59, 130, 246, 0.2)';
                            setTimeout(() => { btn.style.background = ''; }, 300);
                        }
                    } catch (e) { console.error('Error liking:', e); }
                });

                // Setup Share Listener
                document.getElementById('shareBtn').addEventListener('click', async () => {
                    const shareData = {
                        title: blog.title,
                        text: `Check out this blog on FinPulse: ${blog.title}`,
                        url: window.location.href
                    };
                    try {
                        if (navigator.share) {
                            await navigator.share(shareData);
                        } else {
                            await navigator.clipboard.writeText(window.location.href);
                            alert('Blog link copied to clipboard!');
                        }
                    } catch (err) {
                        console.error('Error sharing:', err);
                    }
                });

                // Setup Comment Form Listener
                document.getElementById('commentForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const btn = e.target.querySelector('button');
                    const oTxt = btn.textContent;
                    btn.textContent = 'Posting...';
                    btn.disabled = true;

                    const author = document.getElementById('commenterName').value.trim() || 'Anonymous Reader';
                    const text = document.getElementById('commenterText').value.trim();

                    try {
                        const cRes = await fetch(`/api/blogs/${blogId}/comment`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ author, text })
                        });
                        if (cRes.ok) {
                            const commentsArray = await cRes.json();
                            renderComments(commentsArray);
                            document.getElementById('commenterText').value = '';
                        }
                    } catch (err) {
                        alert('Error posting comment');
                    } finally {
                        btn.textContent = oTxt;
                        btn.disabled = false;
                    }
                });

                if (window.lucide) window.lucide.createIcons();
            } catch (error) {
                loadingState.innerHTML = '<p style="text-align:center; color:red;">Blog could not be found or connection error.</p>';
            }
            
            function renderComments(comments) {
                const list = document.getElementById('commentList');
                if (comments.length === 0) {
                    list.innerHTML = '<p style="color:#64748b; font-style:italic;">No comments yet. Be the first to share your thoughts!</p>';
                    return;
                }
                
                list.innerHTML = '';
                // Append newest bottom or newest top? Usually bottom is fine for chron, but top is better for immediate feedback. Let's do bottom.
                comments.forEach(c => {
                    const cDiv = document.createElement('div');
                    cDiv.className = 'comment-item';
                    cDiv.innerHTML = `
                        <div class="comment-header">
                            <span class="comment-author">${c.author}</span>
                            <span class="comment-date">${new Date(c.createdAt).toLocaleString()}</span>
                        </div>
                        <div class="comment-text">${c.text}</div>
                    `;
                    list.appendChild(cDiv);
                });
            }
        });
    </script>
</body>
</html>
